<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Login de Administrador</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body class="admin-page">

  <div class="auth-bar">
    <h1 class="title">Login - Admin</h1>

    <input type="text" id="username" placeholder="Usuário" />
    <input type="password" id="password" placeholder="Senha" />
    <a href="forgotpassword.html" class="recovery-link">Esqueci minha senha</a>
    
    <div class="button-group">
      <button id="btnLogin" class="button">Entrar</button>
      <a href="home.html" class="button">Sair</a>
    </div>
  </div>

  <p id="message" class="error"></p>

  <script type="module" src="js/authManager.js"></script>
</body>
</html>
