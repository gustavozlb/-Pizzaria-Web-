version: "3.9"

services:
  db:
    image: mariadb:10.11 
    container_name: bancopizzaria
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: GustavoZlb@123
      MYSQL_DATABASE: bancopizzaria

    ports:
      - "3306:3306"

    volumes:
      - db_data:/var/lib/mysql

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -pGustavoZlb@123 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s   

  app:
    build: .
    container_name: adminlogin_app
    restart: always

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "8080:8080"

    environment:
      DB_URL: jdbc:mysql://db:3306/bancopizzaria?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USER: root
      DB_PASSWORD: GustavoZlb@123

volumes:
  db_data: